<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阅读 - {{ comic_id }}</title>
    <style>
        * { box-sizing: border-box; }
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }
        body {
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
            padding: 0 16px 16px;
            background: #0f0f1a;
            color: #eee;
            display: flex;
            flex-direction: column;
        }
        .toolbar {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 0;
            flex-wrap: wrap;
        }
        .toolbar a { color: #e94560; text-decoration: none; }
        .toolbar a:hover { text-decoration: underline; }
        .page-info { color: #888; }
        /* 漫画区域：用 margin:auto 居中，放大后四向可滚动且保持居中 */
        .viewer {
            flex: 1;
            min-height: 0;
            display: flex;
            overflow: auto;
        }
        .viewer img {
            display: block;
            max-width: none;
            margin: auto;
            user-select: none;
            -webkit-user-drag: none;
        }
        .viewer.pan-cursor { cursor: grab; }
        .viewer.pan-cursor:active { cursor: grabbing; }
        /* 悬浮：翻页 + 缩放 */
        .float-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 100;
        }
        .float-nav button {
            position: absolute;
            padding: 14px 20px;
            background: rgba(22, 33, 62, 0.95);
            color: #eee;
            border: 1px solid #e94560;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            pointer-events: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: background 0.2s, transform 0.15s;
        }
        .float-nav button:hover:not(:disabled) {
            background: #1a1a2e;
            transform: scale(1.05);
        }
        .float-nav button:disabled { opacity: 0.4; cursor: not-allowed; }
        .float-nav .btn-prev { left: 16px; top: 50%; transform: translateY(-50%); }
        .float-nav .btn-prev:hover:not(:disabled) { transform: translateY(-50%) scale(1.05); }
        .float-nav .btn-next { right: 16px; top: 50%; transform: translateY(-50%); }
        .float-nav .btn-next:hover:not(:disabled) { transform: translateY(-50%) scale(1.05); }
        /* 底部页数跳转栏 */
        .page-jump-bar {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 0;
            flex-wrap: wrap;
            border-top: 1px solid #333;
        }
        .page-links {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }
        .page-links a, .page-links span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 28px;
            height: 28px;
            padding: 0 6px;
            border-radius: 6px;
            font-size: 14px;
            text-decoration: none;
            color: #aaa;
            transition: background 0.2s, color 0.2s;
        }
        .page-links a:hover {
            background: rgba(233, 69, 96, 0.3);
            color: #eee;
        }
        .page-links a.active {
            background: #e94560;
            color: #fff;
        }
        .page-links .ellipsis {
            color: #666;
            cursor: default;
        }
        .page-jump-input {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-left: 12px;
        }
        .page-jump-input input {
            width: 56px;
            height: 28px;
            padding: 0 8px;
            border: 1px solid #444;
            border-radius: 6px;
            background: #1a1a2e;
            color: #eee;
            font-size: 14px;
            text-align: center;
        }
        .page-jump-input input:focus {
            outline: none;
            border-color: #e94560;
        }
        .page-jump-input button {
            height: 28px;
            padding: 0 14px;
            border: 1px solid #e94560;
            border-radius: 6px;
            background: rgba(233, 69, 96, 0.3);
            color: #eee;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .page-jump-input button:hover {
            background: #e94560;
        }
        .mode-toggle-btn {
            position: fixed;
            top: 12px;
            right: 24px;
            z-index: 120;
            padding: 6px 14px;
            border-radius: 16px;
            border: 1px solid #e94560;
            background: rgba(22, 33, 62, 0.95);
            color: #eee;
            font-size: 13px;
            cursor: pointer;
        }
        .mode-toggle-btn:hover {
            background: #e94560;
        }
        #stripContainer {
            width: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 16px 0;
        }
        #stripContainer img.strip-page {
            max-width: 100%;
            height: auto;
            margin: 0 auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <a href="{{ base_url }}/">← 返回列表</a>
        <span class="page-info" id="pageInfo">加载中…</span>
    </div>
    <button id="modeToggle" class="mode-toggle-btn">条漫模式</button>
    <div class="viewer">
        <img id="pageImg" alt="漫画页" />
        <div id="stripContainer"></div>
    </div>
    <div class="page-jump-bar">
        <div class="page-links" id="pageLinks"></div>
        <div class="page-jump-input">
            <input type="number" id="pageInput" min="1" placeholder="页" />
            <button id="jumpBtn">跳转</button>
        </div>
    </div>
    <nav class="float-nav" aria-label="翻页">
        <button id="prev" class="btn-prev">上一页</button>
        <button id="next" class="btn-next">下一页</button>
    </nav>
    <script>
        const baseUrl = '{{ base_url }}';
        const comicId = '{{ comic_id }}';
        const viewerEl = document.querySelector('.viewer');
        const pageImg = document.getElementById('pageImg');
        const stripContainer = document.getElementById('stripContainer');
        const modeToggleBtn = document.getElementById('modeToggle');
        let pages = [];
        let currentIndex = 0;
        let zoom = 1;
        const ZOOM_STEP = 1.25;
        const ZOOM_MIN = 0.3;
        const ZOOM_MAX = 5;
        const STRIP_BATCH_SIZE = 10;  // 条漫模式下每次加载的页数
        let stripLoadedCount = 0;     // 已加载到条漫容器中的页数
        let mode = 'page';  // 'page' 单页翻页模式，'strip' 条漫模式
        let isFirstImageLoad = true;

        function loadPages() {
            return fetch(baseUrl + '/api/comics/' + encodeURIComponent(comicId) + '/pages')
                .then(r => r.json());
        }
        function applyZoom() {
            if (!pageImg.naturalWidth) return;
            const vw = viewerEl.clientWidth;
            const vh = viewerEl.clientHeight;
            const nw = pageImg.naturalWidth;
            const nh = pageImg.naturalHeight;
            const fitScale = Math.min(vw / nw, vh / nh);
            const scale = fitScale * zoom;
            pageImg.style.width = (nw * scale) + 'px';
            pageImg.style.height = (nh * scale) + 'px';
            updatePanCursor();
        }
        function onImageLoad() {
            if (isFirstImageLoad) {
                zoom = 1;
                isFirstImageLoad = false;
            }
            applyZoom();
            viewerEl.scrollTop = 0;
            viewerEl.scrollLeft = 0;
        }
        function updatePage() {
            if (mode !== 'page') return;
            if (!pages.length) return;
            const page = pages[currentIndex];
            const url = baseUrl + '/api/comics/' + encodeURIComponent(comicId) + '/pages/' + encodeURIComponent(page.filename);
            pageImg.style.width = '';
            pageImg.style.height = '';
            pageImg.src = url;
            document.getElementById('pageInfo').textContent = `第 ${currentIndex + 1} / ${pages.length} 页`;
            document.getElementById('prev').disabled = currentIndex === 0;
            document.getElementById('next').disabled = currentIndex === pages.length - 1;
            renderPageLinks();
        }
        function renderPageLinks() {
            const container = document.getElementById('pageLinks');
            if (!pages.length) { container.innerHTML = ''; return; }
            const total = pages.length;
            const items = [];
            if (total <= 7) {
                for (let i = 1; i <= total; i++) items.push(i);
            } else {
                items.push(1, 2, 3, 4, '...', total - 2, total - 1, total);
            }
            container.innerHTML = items.map(item => {
                if (item === '...') {
                    return '<span class="ellipsis">…</span>';
                }
                const isActive = item === currentIndex + 1;
                return `<a href="#" class="${isActive ? 'active' : ''}" data-page="${item}">${item}</a>`;
            }).join('');
            container.querySelectorAll('a[data-page]').forEach(a => {
                a.addEventListener('click', function(e) {
                    e.preventDefault();
                    const p = parseInt(this.dataset.page, 10);
                    if (p >= 1 && p <= total) {
                        currentIndex = p - 1;
                        updatePage();
                    }
                });
            });
        }
        function resetStripPages() {
            stripContainer.innerHTML = '';
            stripLoadedCount = 0;
        }
        function loadMoreStripPages() {
            if (!pages.length) return;
            if (stripLoadedCount >= pages.length) return;
            const start = stripLoadedCount;
            const end = Math.min(stripLoadedCount + STRIP_BATCH_SIZE, pages.length);
            for (let i = start; i < end; i++) {
                const page = pages[i];
                const url = baseUrl + '/api/comics/' + encodeURIComponent(comicId) + '/pages/' + encodeURIComponent(page.filename);
                const img = document.createElement('img');
                img.src = url;
                img.alt = '第 ' + (i + 1) + ' 页';
                img.className = 'strip-page';
                img.dataset.index = String(i);
                stripContainer.appendChild(img);
            }
            stripLoadedCount = end;
        }
        function setMode(newMode) {
            if (mode === newMode) return;
            mode = newMode;
            const floatNav = document.querySelector('.float-nav');
            const jumpBar = document.querySelector('.page-jump-bar');
            if (mode === 'strip') {
                pageImg.style.display = 'none';
                stripContainer.style.display = 'flex';
                if (floatNav) floatNav.style.display = 'none';
                if (jumpBar) jumpBar.style.display = 'none';
                resetStripPages();
                loadMoreStripPages();
                viewerEl.scrollTop = 0;
                viewerEl.scrollLeft = 0;
                modeToggleBtn.textContent = '翻页模式';
            } else {
                pageImg.style.display = '';
                stripContainer.style.display = 'none';
                if (floatNav) floatNav.style.display = '';
                if (jumpBar) jumpBar.style.display = '';
                updatePage();
                viewerEl.scrollTop = 0;
                viewerEl.scrollLeft = 0;
                modeToggleBtn.textContent = '条漫模式';
            }
        }
        loadPages().then(p => {
            pages = p;
            if (!pages.length) {
                document.getElementById('pageInfo').textContent = '暂无页面';
                pageImg.style.display = 'none';
                const jumpBar = document.querySelector('.page-jump-bar');
                if (jumpBar) jumpBar.style.display = 'none';
                return;
            }
            currentIndex = 0;
            updatePage();
        }).catch(e => {
            document.getElementById('pageInfo').textContent = '加载失败: ' + e.message;
        });
        pageImg.onload = onImageLoad;
        window.addEventListener('resize', applyZoom);
        pageImg.addEventListener('dragstart', function(e) { e.preventDefault(); });

        // 放大时鼠标拖拽平移
        let panStart = null;
        function updatePanCursor() {
            const canScroll = viewerEl.scrollWidth > viewerEl.clientWidth || viewerEl.scrollHeight > viewerEl.clientHeight;
            viewerEl.classList.toggle('pan-cursor', canScroll);
        }
        viewerEl.addEventListener('mousedown', function(e) {
            if (mode !== 'page') return;
            if (e.button !== 0) return;
            const canScroll = viewerEl.scrollWidth > viewerEl.clientWidth || viewerEl.scrollHeight > viewerEl.clientHeight;
            if (!canScroll) return;
            panStart = { x: e.clientX, y: e.clientY, scrollLeft: viewerEl.scrollLeft, scrollTop: viewerEl.scrollTop };
        });
        document.addEventListener('mousemove', function(e) {
            if (panStart === null) return;
            viewerEl.scrollLeft = panStart.scrollLeft + (panStart.x - e.clientX);
            viewerEl.scrollTop = panStart.scrollTop + (panStart.y - e.clientY);
        });
        document.addEventListener('mouseup', function() { panStart = null; });
        document.addEventListener('mouseleave', function() { panStart = null; });

        document.getElementById('prev').onclick = () => {
            if (mode !== 'page') return;
            if (currentIndex > 0) {
                currentIndex--;
                updatePage();
            }
        };
        document.getElementById('next').onclick = () => {
            if (mode !== 'page') return;
            if (currentIndex < pages.length - 1) {
                currentIndex++;
                updatePage();
            }
        };

        document.getElementById('jumpBtn').onclick = function() {
            if (!pages.length) return;
            const input = document.getElementById('pageInput');
            let p = parseInt(input.value, 10);
            if (isNaN(p) || p < 1) p = 1;
            if (p > pages.length) p = pages.length;
            currentIndex = p - 1;
            if (mode === 'strip') {
                // 确保条漫容器已初始化
                if (!stripContainer.children.length) {
                    resetStripPages();
                    loadMoreStripPages();
                }
                // 若目标页还未加载进来，则按批次继续加载直到包含该页
                while (stripLoadedCount <= currentIndex && stripLoadedCount < pages.length) {
                    loadMoreStripPages();
                }
                const target = stripContainer.querySelector('img[data-index="' + currentIndex + '"]');
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            } else {
                updatePage();
            }
            input.value = '';
        };
        document.getElementById('pageInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('jumpBtn').click();
        });

        // 滚轮交互：单页模式下下滑下一页、上滑上一页；Shift+下滑放大、Shift+上滑缩小；中键按下复原
        document.addEventListener('wheel', function(e) {
            if (mode === 'strip') {
                // 条漫模式下保留默认滚动行为，仅可选处理 Shift 情况
                return;
            }
            if (e.shiftKey) {
                e.preventDefault();
                if (e.deltaY > 0) {
                    zoom = Math.max(zoom / ZOOM_STEP, ZOOM_MIN);
                } else {
                    zoom = Math.min(zoom * ZOOM_STEP, ZOOM_MAX);
                }
                applyZoom();
            } else {
                e.preventDefault();
                if (e.deltaY > 0 && currentIndex < pages.length - 1) {
                    currentIndex++;
                    updatePage();
                } else if (e.deltaY < 0 && currentIndex > 0) {
                    currentIndex--;
                    updatePage();
                }
            }
        }, { passive: false });
        // 条漫模式下接近底部时按批次追加后续页面，避免一次性加载全部撑爆内存
        viewerEl.addEventListener('scroll', function() {
            if (mode !== 'strip') return;
            if (stripLoadedCount >= pages.length) return;
            const threshold = 400;
            if (viewerEl.scrollTop + viewerEl.clientHeight + threshold >= viewerEl.scrollHeight) {
                loadMoreStripPages();
            }
        });
        document.addEventListener('mousedown', function(e) {
            if (e.button === 1) {
                e.preventDefault();
                zoom = 1;
                applyZoom();
            }
        });
        modeToggleBtn.addEventListener('click', function() {
            setMode(mode === 'page' ? 'strip' : 'page');
        });
    </script>
</body>
</html>
