<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漫画管理系统</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
            margin: 0;
            padding: 24px;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        h1 { margin-top: 0; color: #e94560; }
        .root-info { color: #888; font-size: 14px; margin-bottom: 16px; }
        .toolbar {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .search-box input {
            width: 220px;
            padding: 8px 12px;
            border: 1px solid #444;
            border-radius: 8px;
            background: #16213e;
            color: #eee;
            font-size: 14px;
        }
        .search-box input:focus {
            outline: none;
            border-color: #e94560;
        }
        .search-box input::placeholder { color: #666; }
        .pagination-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }
        .pagination-bar button {
            padding: 8px 16px;
            border: 1px solid #e94560;
            border-radius: 8px;
            background: rgba(233, 69, 96, 0.2);
            color: #eee;
            font-size: 14px;
            cursor: pointer;
        }
        .pagination-bar button:hover:not(:disabled) {
            background: #e94560;
        }
        .pagination-bar button:disabled { opacity: 0.4; cursor: not-allowed; }
        .pagination-bar .page-info { color: #888; font-size: 14px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }
        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            text-decoration: none;
            color: #eee;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(233, 69, 96, 0.3);
        }
        .card .cover {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
            background: #0f0f1a;
        }
        .card .cover-placeholder {
            width: 100%;
            aspect-ratio: 3/4;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            border-radius: 8px;
            margin-bottom: 10px;
            background: #0f0f1a;
        }
        .card .title { font-weight: 600; word-break: break-all; }
    </style>
</head>
<body>
    <h1>漫画管理系统</h1>
    <p class="root-info">漫画目录：{{ comic_root }}</p>
    <div class="toolbar">
        <div class="search-box">
            <label for="searchInput">搜索：</label>
            <input type="text" id="searchInput" placeholder="按名称模糊查询" />
        </div>
    </div>
    <div class="grid" id="comics"></div>
    <div class="pagination-bar" id="paginationBar" style="display: none;">
        <button type="button" id="prevPage">上一页</button>
        <span class="page-info" id="pageInfo"></span>
        <button type="button" id="nextPage">下一页</button>
    </div>
    <script>
        const baseUrl = '{{ base_url }}';
        const PAGE_SIZE = 24;
        let allComics = [];
        let currentPage = 1;

        function escapeHtml(s) {
            const div = document.createElement('div');
            div.textContent = s;
            return div.innerHTML;
        }

        function getSearchKeyword() {
            return (document.getElementById('searchInput').value || '').trim().toLowerCase();
        }

        function filterComics(comics, keyword) {
            if (!keyword) return comics;
            return comics.filter(c => (c.title || '').toLowerCase().includes(keyword));
        }

        function renderGrid(comicsToShow) {
            const el = document.getElementById('comics');
            if (!comicsToShow.length) {
                el.innerHTML = '<p>暂无匹配的漫画。</p>';
                return;
            }
            el.innerHTML = comicsToShow.map(c => {
                const coverUrl = c.cover_filename
                    ? baseUrl + '/api/comics/' + encodeURIComponent(c.id) + '/pages/' + encodeURIComponent(c.cover_filename)
                    : '';
                const coverHtml = coverUrl
                    ? '<img class="cover" src="' + coverUrl + '" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">' +
                      '<div class="cover-placeholder" style="display:none;">📚</div>'
                    : '<div class="cover-placeholder">📚</div>';
                return '<a class="card" href="' + baseUrl + '/reader/' + encodeURIComponent(c.id) + '">' +
                    coverHtml +
                    '<div class="title">' + escapeHtml(c.title) + '</div></a>';
            }).join('');
        }

        function updatePaginationBar(totalFiltered) {
            const bar = document.getElementById('paginationBar');
            const totalPages = Math.max(1, Math.ceil(totalFiltered / PAGE_SIZE));
            if (totalFiltered <= PAGE_SIZE || totalFiltered === 0) {
                bar.style.display = 'none';
                return;
            }
            bar.style.display = 'flex';
            document.getElementById('pageInfo').textContent = '第 ' + currentPage + ' / ' + totalPages + ' 页（共 ' + totalFiltered + ' 本）';
            document.getElementById('prevPage').disabled = currentPage <= 1;
            document.getElementById('nextPage').disabled = currentPage >= totalPages;
        }

        function applyFilterAndPage() {
            const keyword = getSearchKeyword();
            const filtered = filterComics(allComics, keyword);
            const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
            if (currentPage > totalPages) currentPage = totalPages;
            const start = (currentPage - 1) * PAGE_SIZE;
            const slice = filtered.slice(start, start + PAGE_SIZE);
            renderGrid(slice);
            updatePaginationBar(filtered.length);
        }

        fetch(baseUrl + '/api/comics')
            .then(r => r.json())
            .then(comics => {
                allComics = comics;
                const el = document.getElementById('comics');
                if (!comics.length) {
                    el.innerHTML = '<p>暂无漫画，请将漫画放在上述目录的子文件夹中（每文件夹一本）。</p>';
                    document.getElementById('paginationBar').style.display = 'none';
                    return;
                }
                currentPage = 1;
                applyFilterAndPage();
            })
            .catch(e => {
                document.getElementById('comics').innerHTML = '<p>加载失败：' + e.message + '</p>';
                document.getElementById('paginationBar').style.display = 'none';
            });

        document.getElementById('searchInput').addEventListener('input', function() {
            currentPage = 1;
            applyFilterAndPage();
        });

        document.getElementById('prevPage').onclick = function() {
            if (currentPage > 1) {
                currentPage--;
                applyFilterAndPage();
            }
        };
        document.getElementById('nextPage').onclick = function() {
            const keyword = getSearchKeyword();
            const filtered = filterComics(allComics, keyword);
            const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
            if (currentPage < totalPages) {
                currentPage++;
                applyFilterAndPage();
            }
        };
    </script>
</body>
</html>
